services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 199825
      POSTGRES_DB: booking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis 

 
  celery_worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - C_FORCE_ROOT=1  
    depends_on:
      - db
      - redis

  
  celery_beat:
    build: .
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      - db
      - redis

volumes:
  postgres_data: